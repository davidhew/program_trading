services:
  quant_bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stock_analyzer
    environment:
      - APP_ENV=${APP_ENV:-prod}
      - TZ=Asia/Shanghai
      - http_proxy= 
      - https_proxy=
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: always
    logging:
      driver: "json-file"       # 官方默认驱动
      options:
        max-size: "10m"         # 单个日志文件最大 10MB
        max-file: "3"           # 最多保留 3 个旧日志文件（旧的会被自动覆盖）
    volumes:
      - .:/app              # 将当前代码目录映射到容器
      - /Users/weihe/stock/stock_datas:/app/stock_datas
      - /Users/weihe/stock/secret_config:/app/secret_config:ro #敏感信息配置文件映射
    working_dir: /app
    # 使用变量替换，格式为 ${变量名:-默认值}
    command: python jobStarter.py
